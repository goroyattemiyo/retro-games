<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>倉庫番 - SOKOBAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
  <style>
    :root{--green:#00ff41;--green-dim:#00aa2a;--green-dark:#003f0f;--green-faint:#001a06;--amber:#ffb300;--bg:#000d02;--sl:rgba(0,255,65,.03);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--green);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--sl) 2px,var(--sl) 4px);pointer-events:none;z-index:100;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:99;}

    #terminal{width:min(1100px,98vw);border:2px solid var(--green-dim);box-shadow:0 0 30px rgba(0,255,65,.2);background:var(--bg);}

    /* タイトルバー */
    #tb{background:var(--green-dark);border-bottom:1px solid var(--green-dim);padding:4px 12px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--green-dim);letter-spacing:2px;}
    #tb a{color:var(--green-dim);text-decoration:none;} #tb a:hover{color:var(--green);}
    .blink{animation:blink 1s step-end infinite;} @keyframes blink{50%{opacity:0;}}

    #screen{padding:16px;}

    /* ヘッダー */
    #hd{text-align:center;margin-bottom:14px;border-bottom:1px solid var(--green-dark);padding-bottom:10px;}
    #hd h1{font-family:'DotGothic16',monospace;font-size:26px;text-shadow:0 0 10px var(--green);letter-spacing:8px;}
    #hd .sub{font-size:11px;color:var(--green-dim);letter-spacing:4px;margin-top:3px;}

    /* メインレイアウト: マップ左 + パネル右 */
    #main{display:flex;flex-direction:column;gap:10px;align-items:center;}

    /* マップエリア - 固定幅で文字がずれない */
    #map-wrap{
      width:100%;
      background:#000;
      border:1px solid var(--green-dark);
      padding:12px;
      text-align:center;
    }
    #ga{
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(20px,3.5vw,32px);
      line-height:1.4;
      letter-spacing:0.05em;
      white-space:pre;  /* 絶対に折り返さない */
      overflow:hidden;
    }
    #ga span{ display:inline; }
    .cell-wall       { color:var(--green-dim); }
    .cell-floor      { color:#001f07; }
    .cell-box        { color:var(--amber); text-shadow:0 0 5px var(--amber); }
    .cell-goal       { color:#ff6b6b; }
    .cell-done       { color:#00ffff; text-shadow:0 0 5px #00ffff; }
    .cell-player     { color:var(--green); text-shadow:0 0 8px var(--green); }
    .cell-player-goal{ color:#ff6b6b; text-shadow:0 0 8px #ff6b6b; }

    /* 右パネル */
    #panel{
      flex:1 1 140px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:130px;
    }

    .panel-block{display:flex;align-items:center;gap:8px;border:1px solid var(--green-dark);background:var(--green-faint);padding:4px 10px;}
    .panel-label{font-size:10px;color:var(--green-dark);letter-spacing:2px;white-space:nowrap;}
    .panel-value{font-size:16px;color:var(--green);text-shadow:0 0 6px rgba(0,255,65,.3);min-width:2em;}
    .panel-value.small{font-size:14px;}

    #stage-name{display:none;}

    /* ボタン群 */
    .btn-row{display:flex;gap:6px;}
    .sbtn{
      flex:1;
      background:var(--green-dark);border:1px solid var(--green-dim);
      color:var(--green);font-family:'Share Tech Mono',monospace;
      font-size:11px;padding:5px 4px;cursor:pointer;letter-spacing:1px;
      transition:all .1s;text-align:center;
    }
    .sbtn:hover{background:var(--green-dim);color:var(--bg);}
    .sbtn.full{flex:1 0 100%;}

    /* クリア画面 */
    #cs{text-align:center;padding:30px 10px;}
    #cs .big{font-family:'DotGothic16',monospace;font-size:18px;color:#00ffff;text-shadow:0 0 10px #00ffff;animation:pulse 1s ease-in-out infinite;letter-spacing:3px;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
    #cs p{margin-top:10px;color:var(--green-dim);font-size:11px;}

    /* コントロールガイド */
    #ctrl{margin-top:10px;border-top:1px solid var(--green-dark);padding-top:8px;font-size:13px;color:var(--green-dim);display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
    #ctrl kbd{background:var(--green-dark);border:1px solid var(--green-dim);padding:2px 6px;color:var(--green);font-family:inherit;font-size:13px;}
  </style>
</head>
<body>
<div id="terminal">
  <div id="tb">
    <span><a href="../index.html">◀ MENU</a> &nbsp;|&nbsp; SOKOBAN.EXE ver 1.00</span>
    <span class="blink">■</span>
    <span>PC-9801</span>
  </div>
  <div id="screen">
    <div id="hd">
      <h1>倉庫番</h1>
      <div class="sub">SOKOBAN &mdash; WAREHOUSE KEEPER</div>
    </div>

    <div id="main">
      <!-- 左: マップ固定エリア -->
      <div id="map-wrap">
        <div id="ga"><div style="padding:40px 20px;color:var(--green-dim);font-size:13px;letter-spacing:3px;">LOADING...</div></div>
      </div>

      <!-- 右: ステータスパネル -->
      <div id="panel">
        <div id="stage-name">---</div>

        <div class="panel-block">
          <div class="panel-label">STAGE</div>
          <div class="panel-value" id="sn">1</div>
        </div>

        <div class="panel-block">
          <div class="panel-label">MOVES</div>
          <div class="panel-value" id="mc">0</div>
        </div>

        <div class="panel-block">
          <div class="panel-label">BOXES</div>
          <div class="panel-value small" id="bc">0/0</div>
        </div>

        <div class="btn-row">
          <button class="sbtn" id="bp">◀</button>
          <button class="sbtn" id="br">RESET</button>
          <button class="sbtn" id="bn">▶</button>
        </div>
      </div>
    </div>

    <div id="ctrl">
      <span><kbd>↑↓←→</kbd> 移動</span>
      <span><kbd>WASD</kbd> 移動</span>
      <span><kbd>R</kbd> やり直し</span>
      <span><kbd>N/P</kbd> ステージ</span>
    </div>
  </div>
    <div style="margin-top:12px;border:1px solid var(--green-dark);padding:8px 12px;background:var(--green-faint);font-size:11px;color:var(--green-dim);line-height:1.8;">
      <span style="color:var(--green);">@ </span>プレイヤー &nbsp;
      <span style="color:var(--amber);">$ </span>箱 &nbsp;
      <span style="color:#ff6b6b;">x </span>ゴール &nbsp;
      <span style="color:#00ffff;">* </span>箱がゴール上<br>
      箱を押して全ての<span style="color:#ff6b6b;">x</span>に<span style="color:var(--amber);">$</span>を乗せればクリア！
    </div>
</div>

<script type="py">
from pyscript import document
from pyodide.ffi import create_proxy

S=[]
def is_deadlock(grid,boxes,W2,H2):
    # 角デッドロック判定
    for br,bc in boxes:
        if grid[br][bc]!='$': continue
        wall_u=br==0 or grid[br-1][bc]=='#'
        wall_d=br==H2-1 or grid[br+1][bc]=='#'
        wall_l=bc==0 or grid[br][bc-1]=='#'
        wall_r=bc==W2-1 or grid[br][bc+1]=='#'
        if (wall_u or wall_d) and (wall_l or wall_r): return True
    return False

def gen_stage(num, seed=None):
    import random
    rng=random.Random(seed)
    W2,H2=9,7
    # 外壁
    grid=[['#']*W2 for _ in range(H2)]
    for r in range(1,H2-1):
        for cc in range(1,W2-1):
            grid[r][cc]=' '
    # 内壁をランダムに追加
    for _ in range(4):
        r=rng.randint(1,H2-2)
        cc=rng.randint(1,W2-2)
        grid[r][cc]='#'
    # 空きマス一覧
    def empty():
        return [(r,c) for r in range(H2) for c in range(W2) if grid[r][c]==' ']
    def neighbors(r,c):
        return [(r+dr,c+dc,dr,dc) for dr,dc in[(-1,0),(1,0),(0,-1),(0,1)]]
    # BFSで連結空きマス
    def reachable(sr,sc):
        visited=set();q=[(sr,sc)];visited.add((sr,sc))
        while q:
            r,c=q.pop(0)
            for nr,nc,_,_ in neighbors(r,c):
                if (nr,nc) not in visited and grid[nr][nc]!='#':
                    visited.add((nr,nc));q.append((nr,nc))
        return visited
    # 空きマスが連結かチェック
    emp=empty()
    if not emp: return None
    if len(reachable(*emp[0])) < len(emp)-2: return None
    # ゴール数
    n_boxes=min(2, len(emp)//4)
    if n_boxes<1: return None
    rng.shuffle(emp)
    goals=emp[:n_boxes]
    # 逆算: 箱をゴールに置いてプレイヤーが引っ張るシミュレーション
    boxes=list(goals)
    # プレイヤー初期位置(箱の隣)
    player=None
    for br,bc in boxes:
        for nr,nc,dr,dc in neighbors(br,bc):
            if grid[nr][nc]!='#' and (nr,nc) not in boxes:
                player=(nr,nc);break
        if player:break
    if not player: return None
    # 逆引き移動シミュレーション
    state=(tuple(map(tuple,boxes)),player)
    for _ in range(60):
        br,bc=boxes[rng.randint(0,len(boxes)-1)]
        dr,dc=rng.choice([(-1,0),(1,0),(0,-1),(0,1)])
        # 逆算: 箱を(dr,dc)方向に引くにはプレイヤーが箱の(dr,dc)側にいる
        pr,pc=br+dr,bc+dc   # 箱を引いた後の箱位置
        plr,plc=br-dr,bc-dc # プレイヤーが引く前にいる位置
        nb_r,nb_c=br+dr,bc+dc
        if(nb_r<0 or nb_r>=H2 or nb_c<0 or nb_c>=W2): continue
        if grid[nb_r][nb_c]=='#': continue
        if(plr<0 or plr>=H2 or plc<0 or plc>=W2): continue
        if grid[plr][plc]=='#': continue
        if(nb_r,nb_c) in boxes: continue
        idx=boxes.index((br,bc))
        boxes[idx]=(nb_r,nb_c)
        player=(br,bc)
    # プレイヤーと箱がゴール上にないか確認
    for i,(br,bc) in enumerate(boxes):
        if (br,bc) in goals:
            boxes[i]=(br+1,bc) if br+1<H2-1 and grid[br+1][bc]!='#' else (br,bc)
    # デッドロックチェック
    box_positions=[(br,bc) for br,bc in boxes]
    test_grid=[row[:] for row in grid]
    for br,bc in box_positions: test_grid[br][bc]='$'
    if is_deadlock(test_grid,box_positions,W2,H2): return None
    # マップ組み立て
    result=[row[:] for row in grid]
    for gr,gc in goals: result[gr][gc]='.'
    for br,bc in boxes:
        if result[br][bc]=='.': result[br][bc]='*'
        else: result[br][bc]='$'
    pr,pc=player
    if result[pr][pc]=='.': result[pr][pc]='+'
    else: result[pr][pc]='@'
    return {"name":f"STAGE {num}","map":[''.join(row) for row in result]}

# 起動時に5ステージ生成
import random
for i in range(5):
    s=None
    for seed in range(100):
        s=gen_stage(i+1, seed=i*100+seed)
        if s:
            # 箱とゴール数確認
            boxes=sum(row.count('$')+row.count('*') for row in s['map'])
            goals=sum(row.count('.')+row.count('*')+row.count('+') for row in s['map'])
            if boxes==goals and boxes>0: break
    if s: S.append(s)
if not S:
    S=[{"name":"STAGE 1","map":["#####","#.  #","#   #","#@$.#","#####"]}]
W='#';F=' ';B='$';G='.';D='*';P='@';PG='+'
DI={W:('#','cell-wall'),F:('.','cell-floor'),B:('$','cell-box'),G:('x','cell-goal'),D:('*','cell-done'),P:('@','cell-player'),PG:('+','cell-player-goal')}
st={'i':0,'g':[],'p':(0,0),'m':0,'c':False}

def ps(i):
  r=[list(x) for x in S[i]['map']];p=(0,0)
  for y,row in enumerate(r):
    for x,c in enumerate(row):
      if c in(P,PG):p=(y,x)
  return r,p

def ls(i):
  st['i']=i;st['g'],st['p']=ps(i);st['m']=0;st['c']=False;rd()

def cb(g):
  pl=sum(row.count(D) for row in g)
  tot=pl+sum(row.count(B) for row in g)
  return pl,tot

def ic(g): return not any(B in row for row in g)

def mv(dr,dc):
  if st['c']:return
  r,c=st['p'];nr,nc=r+dr,c+dc;g=st['g']
  if nr<0 or nr>=len(g) or nc<0 or nc>=len(g[nr]):return
  t=g[nr][nc]
  if t==W:return
  if t in(B,D):
    br2,bc2=nr+dr,nc+dc
    if br2<0 or br2>=len(g) or bc2<0 or bc2>=len(g[br2]):return
    bv=g[br2][bc2]
    if bv in(W,B,D):return
    g[nr][nc]=G if t==D else F
    g[br2][bc2]=D if bv==G else B
  cur=g[r][c];g[r][c]=G if cur==PG else F
  g[nr][nc]=PG if g[nr][nc]==G else P
  st['p']=(nr,nc);st['m']+=1
  if ic(g):st['c']=True
  rd()

def rd():
  g=st['g'];pl,tot=cb(g)
  document.getElementById('sn').textContent=str(st['i']+1)
  document.getElementById('mc').textContent=str(st['m'])
  document.getElementById('bc').textContent=f"{pl}/{tot}"
  document.getElementById('stage-name').textContent=S[st['i']]['name']
  ga=document.getElementById('ga')
  if st['c']:
    ga.innerHTML='<div id="cs"><div class="big">*** CLEAR! ***</div><p>MOVES: '+str(st['m'])+'</p></div>'
    return
  # 各行を固定幅でレンダリング - rowをそのままループしてspanを並べる
  lines=[]
  for row in g:
    line=''
    for ch in row:
      if ch==' ':ch=F
      s,cl=DI.get(ch,(ch,'cell-floor'))
      line+=f'<span class="{cl}">{s}</span>'
    lines.append(line)
  ga.innerHTML='\n'.join(lines)

def ok(e):
  k=e.key
  if   k=='ArrowUp'    or k=='w':mv(-1, 0)
  elif k=='ArrowDown'  or k=='s':mv( 1, 0)
  elif k=='ArrowLeft'  or k=='a':mv( 0,-1)
  elif k=='ArrowRight' or k=='d':mv( 0, 1)
  elif k in('r','R'):ls(st['i'])
  elif k in('n','N'):
    if st['i']<len(S)-1:ls(st['i']+1)
  elif k in('p','P'):
    if st['i']>0:ls(st['i']-1)
  e.preventDefault()

def on_r(e):ls(st['i'])
def on_n(e):
  if st['i']<len(S)-1:ls(st['i']+1)
def on_p(e):
  if st['i']>0:ls(st['i']-1)

document.addEventListener('keydown', create_proxy(ok))
document.getElementById('br').addEventListener('click', create_proxy(on_r))
document.getElementById('bn').addEventListener('click', create_proxy(on_n))
document.getElementById('bp').addEventListener('click', create_proxy(on_p))
ls(0)
</script>
</body>
</html>
